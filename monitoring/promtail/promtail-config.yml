# Promtail — scrapes Docker container stdout/stderr and ships to Loki.
#
# Limited to containers labelled `logging=adam` so we don't ingest logs from
# unrelated containers running on the same host.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-adam
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: label
            values: ["logging=adam"]
    relabel_configs:
      # Container name (without leading slash) becomes the `service` label.
      - source_labels: [__meta_docker_container_name]
        regex: /?(.*)
        target_label: service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_container_label_logging_jobname]
        target_label: job
        regex: (.+)
      - source_labels: [__meta_docker_container_id]
        target_label: container_id
    pipeline_stages:
      # The .NET console logger writes timestamped multi-line entries; collapse
      # subsequent indented lines into the previous entry so exception stack
      # traces are kept together.
      - multiline:
          firstline: '^(?:info|warn|fail|crit|trce|dbug):'
          max_wait_time: 3s
      # Extract a level label from the .NET log prefix ("info:", "fail:", …).
      - regex:
          expression: '^(?P<level>info|warn|fail|crit|trce|dbug):'
      - labels:
          level:
